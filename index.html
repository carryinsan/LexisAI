<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LexisAI</title>
    
    <link rel="stylesheet" href="css/core/reset.css">
    <link rel="stylesheet" href="css/core/variables.css">
    <link rel="stylesheet" href="css/layout/appLayout.css">
    <link rel="stylesheet" href="css/layout/sidebar.css">
    <link rel="stylesheet" href="css/layout/bottombar.css">
    
    <link rel="stylesheet" href="css/components/chat.css">
    <link rel="stylesheet" href="css/pages/modes.css">
    <link rel="stylesheet" href="css/components/cards.css">
    <link rel="stylesheet" href="css/components/accordions.css">

    <style>
        body, html { height: 100%; height: 100dvh; }
        #app-container { height: 100%; height: 100dvh; }
        #bottombar { 
            padding-bottom: max(15px, env(safe-area-inset-bottom)); 
            background-color: var(--bg-primary); 
            border-top: 1px solid var(--border-color);
        }
    </style>
</head>
<body>
    <div id="app-container">
        <aside id="sidebar" class="sidebar-collapsed">
            <div class="sidebar-header">
                <button id="new-chat-btn" class="btn-primary">+ New Chat</button>
            </div>
            <div class="sidebar-content">
                <div class="chat-history-section">
                    <h3>Recent</h3>
                    <ul id="chat-history-list">
                        </ul>
                </div>
            </div>
            <div class="sidebar-footer">
                <button id="settings-btn" class="btn-icon">⚙️ Settings</button>
            </div>
        </aside>

        <main id="main-content">
            <header id="topbar">
                <div class="topbar-left">
                    <button id="hamburger-menu" class="btn-icon">☰</button>
                    <h1 class="app-title">LexisAI</h1>
                </div>
                <div class="topbar-right">
                    <select id="model-selector" class="dropdown">
                        <option value="oracle" selected>Oracle</option>
                        <option value="flux">Flux</option>
                        <option value="spark">Spark</option>
                    </select>
                    <select id="mode-selector" class="dropdown">
                        <option value="general" selected>General</option>
                        <option value="learn">Learn</option>
                        <option value="deep_research">Research</option>
                        <option value="template">Template</option>
                        <option value="coding">Coding</option>
                        <option value="plan">Plan</option>
                    </select>
                </div>
            </header>

            <div id="chat-container">
                <div id="welcome-screen" class="welcome-active">
                    <h2>Ask Lexis</h2>
                    
                    <div class="flashy-banner">
                        <p>✨ Want to create custom template FREE?? Check out our new website ✨</p>
                        <a href="https://templates-psi-six.vercel.app" target="_blank" class="btn-flashy">Visit Now</a>
                    </div>
                </div>
                
                <div id="messages-wrapper"></div>
            </div>

            <footer id="bottombar">
                <div class="mode-inputs-container"></div>
                <div class="input-container">
                    <button id="upload-btn" class="btn-icon" title="Upload Docs">📎</button>
                    <textarea id="prompt-input" placeholder="Ask Lexis..." rows="1"></textarea>
                    <button id="send-btn" class="btn-icon send-btn">➤</button>
                </div>
                <div class="footer-text">LexisAI can make mistakes. Consider verifying important information.</div>
            </footer>
        </main>
    </div>
    
    <script>
        const sidebar = document.getElementById('sidebar');
        const hamburgerBtn = document.getElementById('hamburger-menu');
        const mainContent = document.getElementById('main-content');

        // Toggle Sidebar
        hamburgerBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            sidebar.classList.toggle('sidebar-collapsed');
        });

        // Close sidebar when clicking outside on mobile
        mainContent.addEventListener('click', () => {
            if (window.innerWidth <= 768 && !sidebar.classList.contains('sidebar-collapsed')) {
                sidebar.classList.add('sidebar-collapsed');
            }
        });
    </script>

    <script type="module" src="js/app.js"></script>
    <script type="module" src="js/systemEnhancer.js"></script>
</body>
</html>
