<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LexisAI</title>
    
    <link rel="stylesheet" href="css/core/reset.css">
    <link rel="stylesheet" href="css/core/variables.css">
    <link rel="stylesheet" href="css/layout/appLayout.css">
    <link rel="stylesheet" href="css/layout/sidebar.css">
    <link rel="stylesheet" href="css/layout/bottombar.css">
    
    <link rel="stylesheet" href="css/components/chat.css">
    <link rel="stylesheet" href="css/pages/modes.css">
    <link rel="stylesheet" href="css/components/cards.css">
    <link rel="stylesheet" href="css/components/accordions.css">

    <style>
        body, html { height: 100%; height: 100dvh; }
        #app-container { height: 100%; height: 100dvh; }
        #bottombar { 
            padding-bottom: max(15px, env(safe-area-inset-bottom)); 
            background-color: var(--bg-primary); 
            border-top: 1px solid var(--border-color);
        }
        /* File Preview Styling */
        #file-preview-area {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 0 15px 10px 15px;
            font-size: 0.75rem;
            color: var(--accent-color);
        }
        .file-badge {
            background: var(--bg-secondary);
            padding: 4px 10px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 5px;
        }
    </style>
</head>
<body>
    <div id="app-container">
        <aside id="sidebar" class="sidebar-collapsed">
            <div class="sidebar-header">
                <button id="new-chat-btn" class="btn-primary">+ New Chat</button>
            </div>
            <div class="sidebar-content">
                <div class="chat-history-section">
                    <h3>Recent</h3>
                    <ul id="chat-history-list">
                        </ul>
                </div>
            </div>
            <div class="sidebar-footer">
                <button id="settings-btn" class="btn-icon">⚙️ Settings</button>
            </div>
        </aside>

        <main id="main-content">
            <header id="topbar">
                <div class="topbar-left">
                    <button id="hamburger-menu" class="btn-icon">☰</button>
                    <h1 class="app-title">LexisAI</h1>
                </div>
                <div class="topbar-right">
                    <select id="model-selector" class="dropdown">
                        <option value="oracle" selected>Oracle</option>
                        <option value="flux">Flux</option>
                        <option value="spark">Spark</option>
                    </select>
                    <select id="mode-selector" class="dropdown">
                        <option value="general" selected>General</option>
                        <option value="learn">Learn</option>
                        <option value="deep_research">Research</option>
                        <option value="template">Template</option>
                        <option value="coding">Coding</option>
                        <option value="plan">Plan</option>
                    </select>
                </div>
            </header>

            <div id="chat-container">
                <div id="welcome-screen" class="welcome-active">
                    <h2>Ask Lexis</h2>
                    
                    <div class="flashy-banner">
                        <p>✨ Want to create custom template FREE?? Check out our new website ✨</p>
                        <a href="https://templates-psi-six.vercel.app" target="_blank" class="btn-flashy">Visit Now</a>
                    </div>
                </div>
                
                <div id="messages-wrapper"></div>
            </div>

            <footer id="bottombar">
                <div class="mode-inputs-container"></div>
                
                <div id="file-preview-area"></div>

                <div class="input-container">
                    <input type="file" id="hidden-file-input" multiple accept=".pdf,.doc,.docx,image/*" style="display: none;">
                    
                    <button id="upload-btn" class="btn-icon" title="Upload Docs/Images">📎</button>
                    <textarea id="prompt-input" placeholder="Ask Lexis..." rows="1"></textarea>
                    <button id="send-btn" class="btn-icon send-btn">➤</button>
                </div>
                <div class="footer-text">LexisAI can make mistakes. Consider verifying important information.</div>
            </footer>
        </main>
    </div>
    
    <script>
        const sidebar = document.getElementById('sidebar');
        const hamburgerBtn = document.getElementById('hamburger-menu');
        const mainContent = document.getElementById('main-content');

        // Toggle Sidebar
        hamburgerBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            sidebar.classList.toggle('sidebar-collapsed');
        });

        // Close sidebar when clicking outside on mobile
        mainContent.addEventListener('click', () => {
            if (window.innerWidth <= 768 && !sidebar.classList.contains('sidebar-collapsed')) {
                sidebar.classList.add('sidebar-collapsed');
            }
        });

        // --- File Upload Logic ---
        const uploadBtn = document.getElementById('upload-btn');
        const fileInput = document.getElementById('hidden-file-input');
        const previewArea = document.getElementById('file-preview-area');

        uploadBtn.addEventListener('click', () => {
            fileInput.click(); // Triggers the native file picker
        });

        fileInput.addEventListener('change', (e) => {
            const files = Array.from(e.target.files);
            let docsCount = 0;
            let imgCount = 0;
            let validFiles = [];

            // Enforce constraints
            files.forEach(file => {
                if (file.type.startsWith('image/')) {
                    imgCount++;
                    if(imgCount <= 3) validFiles.push(file);
                } else if (file.type === 'application/pdf' || file.name.endsWith('.doc') || file.name.endsWith('.docx')) {
                    docsCount++;
                    if(docsCount <= 2) validFiles.push(file);
                }
            });

            if (imgCount > 3 || docsCount > 2) {
                alert('Limit Reached: You can only attach up to 3 Images OR up to 2 PDFs/Docs. Extra files were ignored.');
            }

            // Replace file input data with strictly valid files
            const dt = new DataTransfer();
            validFiles.forEach(f => dt.items.add(f));
            fileInput.files = dt.files;

            // Show previews above text box
            previewArea.innerHTML = '';
            validFiles.forEach(f => {
                const badge = document.createElement('div');
                badge.className = 'file-badge';
                // Shorten name if too long
                const displayName = f.name.length > 15 ? f.name.substring(0, 15) + '...' : f.name;
                const icon = f.type.startsWith('image/') ? '🖼️' : '📄';
                badge.innerHTML = `${icon} ${displayName}`;
                previewArea.appendChild(badge);
            });
        });
        
        // Clear attachments after sending
        document.getElementById('send-btn').addEventListener('click', () => {
            setTimeout(() => {
                // Allows app.js to grab it first, then clears UI
                if(document.getElementById('prompt-input').value === '') {
                   previewArea.innerHTML = '';
                   fileInput.value = '';
                }
            }, 100);
        });
    </script>

    <script type="module" src="js/app.js"></script>
    <script type="module" src="js/systemEnhancer.js"></script>
</body>
</html>
